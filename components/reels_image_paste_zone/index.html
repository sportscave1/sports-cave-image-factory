<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: transparent;
        color: #0B0B0D;
      }
      .zone {
        border: 1px dashed rgba(212, 165, 76, 0.75);
        border-radius: 8px;
        background: #F5F2EA;
        padding: 12px;
        min-height: 74px;
        box-sizing: border-box;
        cursor: pointer;
        outline: none;
      }
      .zone:focus,
      .zone.dragover {
        border-color: #D4A54C;
        box-shadow: 0 0 0 2px rgba(212, 165, 76, 0.25);
      }
      .title {
        font-weight: 800;
        margin-bottom: 4px;
      }
      .help,
      .status {
        color: #66615A;
        font-size: 13px;
        line-height: 1.35;
      }
      .status {
        margin-top: 7px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div id="zone" class="zone" tabindex="0" role="button" aria-label="Paste image here">
      <div class="title">Paste image here</div>
      <div class="help">Click here, then press Ctrl+V to paste an image copied from ChatGPT or another window.</div>
      <div class="help">You can also drag and drop an image directly onto this box.</div>
      <div id="status" class="status"></div>
    </div>

    <script>
      const zone = document.getElementById("zone");
      const statusEl = document.getElementById("status");
      let args = {};

      function sendMessage(type, data) {
        window.parent.postMessage(
          Object.assign({ isStreamlitMessage: true, type }, data || {}),
          "*"
        );
      }

      function setFrameHeight() {
        sendMessage("streamlit:setFrameHeight", { height: document.body.scrollHeight });
      }

      function setValue(value) {
        sendMessage("streamlit:setComponentValue", { value });
      }

      function ready() {
        sendMessage("streamlit:componentReady", { apiVersion: 1 });
        setFrameHeight();
      }

      function parseArgs(event) {
        if (!event.data || !event.data.args) return;
        args = event.data.args || {};
      }

      window.addEventListener("message", (event) => {
        if (event.data && event.data.type === "streamlit:render") {
          parseArgs(event);
          setFrameHeight();
        }
      });

      function safeName(name, fallback) {
        const raw = String(name || fallback || "pasted-image.png");
        return raw.replace(/[^a-zA-Z0-9._-]+/g, "-").replace(/-+/g, "-").replace(/^-|-$/g, "") || "pasted-image.png";
      }

      function fileToBase64(file, source) {
        if (!file || !/^image\/(png|jpeg|webp)$/.test(file.type || "")) {
          statusEl.innerText = "Only PNG, JPG/JPEG, or WEBP images are supported.";
          return;
        }
        const reader = new FileReader();
        reader.onload = () => {
          const result = String(reader.result || "");
          const base64 = result.includes(",") ? result.split(",", 2)[1] : result;
          const fallbackName = `${args.product_handle || "sports-cave"}__${args.asset_type || "image"}${args.scene_slug ? "__" + args.scene_slug : ""}__pasted__v01.png`;
          const payload = {
            filename: safeName(file.name, fallbackName),
            mime: file.type || "image/png",
            data_base64: base64,
            source,
          };
          setValue(payload);
          statusEl.innerText = source === "drop" ? "Dropped image received." : "Pasted image received.";
          setFrameHeight();
        };
        reader.onerror = () => {
          statusEl.innerText = "Could not read that image. Try Download original and upload it instead.";
          setFrameHeight();
        };
        reader.readAsDataURL(file);
      }

      zone.addEventListener("click", () => zone.focus());

      zone.addEventListener("paste", (event) => {
        const items = event.clipboardData && event.clipboardData.items ? Array.from(event.clipboardData.items) : [];
        const imageItem = items.find((item) => item.kind === "file" && /^image\/(png|jpeg|webp)$/.test(item.type || ""));
        if (!imageItem) {
          statusEl.innerText = "No image found on the clipboard.";
          setFrameHeight();
          return;
        }
        event.preventDefault();
        fileToBase64(imageItem.getAsFile(), "paste");
      });

      zone.addEventListener("dragover", (event) => {
        event.preventDefault();
        zone.classList.add("dragover");
      });

      zone.addEventListener("dragleave", () => {
        zone.classList.remove("dragover");
      });

      zone.addEventListener("drop", (event) => {
        event.preventDefault();
        zone.classList.remove("dragover");
        const files = event.dataTransfer && event.dataTransfer.files ? Array.from(event.dataTransfer.files) : [];
        const imageFile = files.find((file) => /^image\/(png|jpeg|webp)$/.test(file.type || ""));
        if (!imageFile) {
          statusEl.innerText = "Drop a PNG, JPG/JPEG, or WEBP image.";
          setFrameHeight();
          return;
        }
        fileToBase64(imageFile, "drop");
      });

      ready();
    </script>
  </body>
</html>
