      function showDeleteDialog() {
        const items = selectedItems();
        if (!items.length || !state.canDelete) return;
        openModal(modal => {
          const countText = `${items.length} item${items.length === 1 ? "" : "s"}`;
          modalHeading(modal, `Delete ${countText}?`, `Move ${countText} to Dropbox Deleted Files? This action is recoverable in Dropbox.`);
          const list = document.createElement("div");
          list.className = "delete-list";
          items.forEach(item => {
            const row = document.createElement("div");
            row.textContent = item.name;
            list.appendChild(row);
          });
          modal.appendChild(list);
          modalActions(modal, `Delete ${countText}`, async button => {
            button.disabled = true;
            button.textContent = "Deleting...";
            try {
              const payload = await apiJson("/api/files-delete", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ current_path: state.currentPath, paths: items.map(item => item.path) }),
              });
              const successful = Array.from(payload.successful || []);
              const failed = Array.from(payload.failed || []);
              closeModal();
              clearSelection();
              if (failed.length) showToast(`Deleted ${successful.length}; ${failed.length} could not be deleted.`, { kind: "error", duration: 6000 });
              else showToast(`Deleted ${successful.length} item${successful.length === 1 ? "" : "s"}`, { kind: "success" });
              await navigateTo(state.currentPath, { remember: false, refresh: true, preserveScroll: true });
            } catch (error) {
              button.disabled = false;
              button.textContent = `Delete ${countText}`;
              showToast(error.message, { kind: "error", duration: 6000 });
            }
          }, { danger: true });
        });
      }

      function showProperties(item = selectedItems()[0]) {
        if (!item) return;
        openModal(modal => {
          modalHeading(modal, item.name);
          const details = document.createElement("dl");
          details.className = "properties";
          const rows = [
            ["Type", item.type],
            ["Location", displayPath(item)],
            ["Size", item.size_label || "-"],
            ["Modified", formatDate(item.modified) || "-"],
            ["Status", item.status || "Online"],
          ];
          rows.forEach(([label, value]) => {
            const term = document.createElement("dt");
            term.textContent = label;
            const description = document.createElement("dd");
            description.textContent = value;
            details.append(term, description);
          });
          modal.appendChild(details);
          const actions = document.createElement("div");
          actions.className = "modal-actions";
          const close = document.createElement("button");
          close.className = "dialog-button primary";
          close.type = "button";
          close.textContent = "OK";
          close.onclick = closeModal;
          actions.appendChild(close);
          modal.appendChild(actions);
        });
      }

      function stopThumbnailLoading() {
        state.thumbnailGeneration += 1;
        if (state.thumbnailObserver) state.thumbnailObserver.disconnect();
        state.thumbnailObserver = null;
        state.thumbnailQueue = [];
        state.thumbnailControllers.forEach(controller => controller.abort());
        state.thumbnailControllers.clear();
        state.thumbnailInFlight.clear();
        state.thumbnailActive = 0;
      }

      function rememberThumbnail(key, objectUrl) {
        if (state.thumbnailCache.has(key)) URL.revokeObjectURL(state.thumbnailCache.get(key));
        state.thumbnailCache.delete(key);
        state.thumbnailCache.set(key, objectUrl);
        while (state.thumbnailCache.size > MAX_CLIENT_THUMBNAILS) {
          const oldest = state.thumbnailCache.keys().next().value;
          URL.revokeObjectURL(state.thumbnailCache.get(oldest));
          state.thumbnailCache.delete(oldest);
        }
      }

      function installThumbnail(key, objectUrl) {
        document.querySelectorAll("img[data-thumbnail-key]").forEach(image => {
          if (image.dataset.thumbnailKey === key) image.src = objectUrl;
        });
      }

      async function fetchThumbnail(task) {
        const controller = new AbortController();
        state.thumbnailControllers.add(controller);
        try {
          const response = await fetch(task.url, { credentials: "same-origin", signal: controller.signal });
          if (!response.ok || task.generation !== state.thumbnailGeneration) return;
          const blob = await response.blob();
          if (!blob.type.startsWith("image/") || task.generation !== state.thumbnailGeneration) return;
          const objectUrl = URL.createObjectURL(blob);
          rememberThumbnail(task.key, objectUrl);
          installThumbnail(task.key, objectUrl);
        } catch (error) {
          if (error.name !== "AbortError") console.warn("Thumbnail unavailable", task.key);
        } finally {
          state.thumbnailControllers.delete(controller);
          state.thumbnailInFlight.delete(task.key);
          state.thumbnailActive = Math.max(0, state.thumbnailActive - 1);
          drainThumbnailQueue();
        }
      }

      function drainThumbnailQueue() {
        while (state.thumbnailActive < MAX_THUMBNAIL_CONCURRENT && state.thumbnailQueue.length) {
          const task = state.thumbnailQueue.shift();
          if (!task || task.generation !== state.thumbnailGeneration || state.thumbnailInFlight.has(task.key)) continue;
          state.thumbnailInFlight.add(task.key);
          state.thumbnailActive += 1;
          fetchThumbnail(task);
        }
      }

      function setupLazyThumbnails() {
        const generation = state.thumbnailGeneration;
        const images = Array.from(document.querySelectorAll("img[data-thumbnail-url]"));
        if (!images.length) return;
        state.thumbnailObserver = new IntersectionObserver(records => {
          records.forEach(record => {
            if (!record.isIntersecting) return;
            state.thumbnailObserver.unobserve(record.target);
            const image = record.target;
            const key = image.dataset.thumbnailKey;
            const cached = state.thumbnailCache.get(key);
            if (cached) {
              state.thumbnailCache.delete(key);
              state.thumbnailCache.set(key, cached);
              image.src = cached;
              return;
            }
            state.thumbnailQueue.push({ key, url: image.dataset.thumbnailUrl, generation });
          });
          drainThumbnailQueue();
        }, { root: elements.results, rootMargin: "240px 0px", threshold: 0.01 });
        images.forEach(image => state.thumbnailObserver.observe(image));
      }

      function sizeLabel(bytes) {
        const value = Number(bytes || 0);
        if (!value) return "0 B";
        const units = ["B", "KB", "MB", "GB", "TB"];
        const index = Math.min(units.length - 1, Math.floor(Math.log(value) / Math.log(1024)));
        const amount = value / Math.pow(1024, index);
        return `${amount < 10 && index ? amount.toFixed(1) : Math.round(amount)} ${units[index]}`;
      }

      function createUploadRow(file, relativePath, destinationPath) {
        return {
          clientId: crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`,
          file,
          name: file.name,
          relativePath: relativePath || file.webkitRelativePath || file.name,
          destinationPath,
          size: Number(file.size || 0),
          uploaded: 0,
          status: "queued",
          error: "",
          errorCode: "",
          uploadId: "",
          uploadSecret: "",
        };
      }

      function addFiles(items, destinationPath = state.currentPath) {
        const rows = Array.from(items || []).map(item => createUploadRow(item.file || item, item.relativePath, destinationPath));
        if (!rows.length) return;
        state.uploadRows.push(...rows);
        state.uploadQueue.push(...rows);
        elements.uploadPanel.classList.add("visible");
        showToast(`Queued ${rows.length} file${rows.length === 1 ? "" : "s"} for upload`, { duration: 2200 });
        renderUploads();
        drainUploadQueue();
      }

      function renderUploads() {
        elements.uploadRows.replaceChildren();
        const active = state.uploadRows.filter(row => row.status !== "completed").length;
        elements.uploadTitle.textContent = active ? `Uploads (${active})` : "Uploads complete";
        state.uploadRows.forEach(row => {
          const wrapper = document.createElement("div");
          wrapper.className = "upload-row";
          const information = document.createElement("div");
          const name = document.createElement("div");
          name.className = "upload-name";
          name.textContent = row.relativePath;
          const status = document.createElement("div");
          status.className = "upload-status";
          const percent = row.size ? Math.min(100, Math.round((row.uploaded / row.size) * 100)) : (row.status === "completed" ? 100 : 0);
          status.textContent = row.status === "failed" ? row.error : (row.status === "completed" ? "Uploaded" : `Uploading ${percent}% - ${sizeLabel(row.uploaded)} of ${sizeLabel(row.size)}`);
          const track = document.createElement("div");
          track.className = "progress-track";
          const bar = document.createElement("div");
          bar.className = "progress-bar";
          bar.style.width = `${percent}%`;
          track.appendChild(bar);
          information.append(name, status, track);
          const actions = document.createElement("div");
          actions.className = "upload-actions";
          if (row.status === "failed") {
            const retry = document.createElement("button");
            retry.type = "button";
            retry.textContent = "Retry";
            retry.onclick = () => retryUpload(row);
            const remove = document.createElement("button");
            remove.type = "button";
            remove.textContent = "Remove";
            remove.onclick = () => removeUpload(row);
            actions.append(retry, remove);
          } else if (row.status === "completed") {
            const remove = document.createElement("button");
            remove.type = "button";
            remove.textContent = "Clear";
            remove.onclick = () => { state.uploadRows = state.uploadRows.filter(candidate => candidate !== row); renderUploads(); };
            actions.appendChild(remove);
          }
          wrapper.append(information, actions);
          elements.uploadRows.appendChild(wrapper);
        });
        if (!state.uploadRows.length) elements.uploadPanel.classList.remove("visible");
      }

      async function startUpload(row) {
        const payload = await apiJson("/api/files-upload/start", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            current_path: row.destinationPath,
            relative_path: row.relativePath,
            size: row.size,
            conflict: state.uploadConflict,
          }),
        });
        row.uploadId = payload.upload_id;
        row.uploadSecret = payload.upload_secret;
        row.uploaded = Number(payload.offset || 0);
      }

      function uploadStatus(row) {
        return apiJson(`/api/files-upload/status?upload_id=${encodeURIComponent(row.uploadId)}`, {
          headers: { "X-Upload-Secret": row.uploadSecret },
        });
      }

      async function uploadChunk(row, blob, final) {
        for (let attempt = 0; attempt < 3; attempt += 1) {
          try {
            return await apiJson("/api/files-upload/chunk", {
              method: "POST",
              headers: {
                "Content-Type": "application/octet-stream",
                "X-Upload-Id": row.uploadId,
                "X-Upload-Secret": row.uploadSecret,
                "X-Upload-Offset": String(row.uploaded),
                "X-Upload-Final": final ? "true" : "false",
              },
              body: blob,
            });
          } catch (error) {
            if (error.code === "offset_mismatch") {
              const status = await uploadStatus(row);
              row.uploaded = Number(status.offset || row.uploaded);
              return status;
            }
            if (attempt === 2) throw error;
            await new Promise(resolve => window.setTimeout(resolve, 500 * (attempt + 1)));
          }
        }
      }

      async function runUpload(row) {
        row.status = "uploading";
        row.error = "";
        row.errorCode = "";
        renderUploads();
        try {
          if (!row.uploadId) await startUpload(row);
          else {
            const status = await uploadStatus(row);
            row.uploaded = Number(status.offset || 0);
            if (status.state === "completed") return completeUpload(row);
          }
          while (row.uploaded < row.size || (row.size === 0 && row.uploaded === 0)) {
            const end = Math.min(row.size, row.uploaded + CHUNK_BYTES);
            const final = end >= row.size;
            const payload = await uploadChunk(row, row.file.slice(row.uploaded, end), final);
            row.uploaded = Number(payload.offset || end);
            renderUploads();
            if (payload.state === "completed" || final) return completeUpload(row);
          }
        } catch (error) {
          row.status = "failed";
          row.error = error.message || "Upload interrupted. Retry to continue.";
          row.errorCode = error.code || "upload_error";
          renderUploads();
          showToast(`Upload failed: ${row.name}. ${row.error}`, { kind: "error", duration: 6500 });
        }
      }

      function completeUpload(row) {
        row.status = "completed";
        row.uploaded = row.size;
        renderUploads();
        showToast(`Uploaded ${row.name}`, { kind: "success" });
        if (row.destinationPath === state.currentPath) {
          window.clearTimeout(state.uploadRefreshTimer);
          state.uploadRefreshTimer = window.setTimeout(
            () => navigateTo(state.currentPath, { remember: false, refresh: true, preserveScroll: true }),
            450,
          );
        }
      }

      function drainUploadQueue() {
        while (state.uploadActive < MAX_UPLOAD_CONCURRENT && state.uploadQueue.length) {
          const row = state.uploadQueue.shift();
          state.uploadActive += 1;
          runUpload(row).finally(() => { state.uploadActive -= 1; drainUploadQueue(); });
        }
      }

      function retryUpload(row) {
        if (row.errorCode === "upload_missing") {
          row.uploadId = "";
          row.uploadSecret = "";
          row.uploaded = 0;
        }
        row.status = "queued";
        row.error = "";
        state.uploadQueue.push(row);
        renderUploads();
        drainUploadQueue();
      }

      async function removeUpload(row) {
        if (row.uploadId) {
          try {
            await apiJson("/api/files-upload/remove", {
              method: "POST",
              headers: { "Content-Type": "application/json", "X-Upload-Secret": row.uploadSecret },
              body: JSON.stringify({ upload_id: row.uploadId }),
            });
          } catch (error) {
            showToast(error.message, { kind: "error", duration: 5000 });
            return;
          }
        }
        state.uploadRows = state.uploadRows.filter(candidate => candidate !== row);
        renderUploads();
      }

      async function walkEntry(entry, prefix) {
        if (entry.isFile) {
          const file = await new Promise((resolve, reject) => entry.file(resolve, reject));
          return [{ file, relativePath: `${prefix}${file.name}` }];
        }
        if (!entry.isDirectory) return [];
        const reader = entry.createReader();
        const children = [];
        while (true) {
          const batch = await new Promise((resolve, reject) => reader.readEntries(resolve, reject));
          if (!batch.length) break;
          children.push(...batch);
        }
        return (await Promise.all(children.map(child => walkEntry(child, `${prefix}${entry.name}/`)))).flat();
      }

      async function droppedItems(dataTransfer) {
        const entries = Array.from(dataTransfer.items || []).map(item => item.webkitGetAsEntry && item.webkitGetAsEntry()).filter(Boolean);
        if (entries.length) return (await Promise.all(entries.map(entry => walkEntry(entry, "")))).flat();
        return Array.from(dataTransfer.files || []).map(file => ({ file, relativePath: file.name }));
      }

      function hasExternalFiles(event) {
        return Boolean(event.dataTransfer && Array.from(event.dataTransfer.types || []).includes("Files"));
      }

      function handleItemKeydown(event, item, index) {
        if (event.key === "Enter") {
          event.preventDefault();
          openItem(item);
        } else if (event.key === "ArrowDown" || event.key === "ArrowRight" || event.key === "ArrowUp" || event.key === "ArrowLeft") {
          event.preventDefault();
          const direction = event.key === "ArrowDown" || event.key === "ArrowRight" ? 1 : -1;
          focusVisibleIndex(Math.max(0, Math.min(visibleItems().length - 1, index + direction)), event.shiftKey);
        }
      }

      function focusVisibleIndex(index, extend = false) {
        const items = visibleItems();
        const item = items[index];
        if (!item) return;
        selectByIndex(index, { range: extend });
        const row = document.getElementById(pathId(item.path));
        if (row) { row.focus({ preventScroll: true }); row.scrollIntoView({ block: "nearest" }); }
      }

      elements.backButton.onclick = navigateBack;
      elements.forwardButton.onclick = navigateForward;
      elements.upButton.onclick = () => navigateTo(parentPath(state.currentPath));
      elements.refreshButton.onclick = () => navigateTo(state.currentPath, { remember: false, refresh: true, preserveScroll: true });
      elements.openButton.onclick = () => openItem(selectedItems()[0]);
      elements.newButton.onclick = showNewFolderDialog;
      elements.downloadButton.onclick = () => startDownload();
      elements.renameButton.onclick = () => showRenameDialog();
      elements.deleteButton.onclick = showDeleteDialog;
      elements.uploadButton.onclick = event => { const bounds = event.currentTarget.getBoundingClientRect(); showMenu(uploadMenuDefinitions(), bounds.left, bounds.bottom + 3); };
      elements.sortButton.onclick = event => { const bounds = event.currentTarget.getBoundingClientRect(); showMenu(sortMenuDefinitions(), bounds.left, bounds.bottom + 3); };
      elements.viewButton.onclick = event => { const bounds = event.currentTarget.getBoundingClientRect(); showMenu(viewMenuDefinitions(), bounds.left, bounds.bottom + 3); };
      elements.moreButton.onclick = event => {
        const chosen = selectedItems();
        const item = chosen.length === 1 ? chosen[0] : null;
        const bounds = event.currentTarget.getBoundingClientRect();
        showMenu([
          { label: "Open", disabled: !item, action: () => openItem(item) },
          { label: "Copy path", disabled: !item, action: () => copyText(displayPath(item)) },
          { label: "Properties", disabled: !item, action: () => showProperties(item) },
          menuDivider(),
          { label: "Install desktop helper", action: downloadHelper },
        ], bounds.left, bounds.bottom + 3);
      };
      elements.checkHelperButton.onclick = () => {
        if (state.helperItem) invokeDesktopHelper(state.helperItem, state.helperItem.kind === "folder" ? "folder" : "file");
      };
      elements.installHelperButton.onclick = downloadHelper;
      elements.downloadInsteadButton.onclick = () => {
        elements.helperPanel.classList.remove("visible");
        if (state.helperItem && state.helperItem.kind !== "folder") startDownload([state.helperItem]);
      };

      elements.searchInput.addEventListener("input", () => {
        state.searchByPath[state.currentPath] = elements.searchInput.value;
        state.anchorIndex = -1;
        clearSelection();
        renderItems();
        renderStatus();
        elements.searchClear.hidden = !currentSearch();
        persistState();
      });
      elements.searchClear.onclick = () => {
        state.searchByPath[state.currentPath] = "";
        elements.searchInput.value = "";
        elements.searchInput.focus();
        renderItems();
        renderStatus();
        elements.searchClear.hidden = true;
        persistState();
      };

      elements.results.addEventListener("click", event => {
        if (!event.target.closest(".file-item")) clearSelection();
      });
      elements.results.addEventListener("contextmenu", event => {
        event.preventDefault();
        if (!event.target.closest(".file-item")) {
          clearSelection();
          showEmptyContextMenu(event.clientX, event.clientY);
        }
      });
      elements.modalBackdrop.addEventListener("pointerdown", event => { if (event.target === elements.modalBackdrop) closeModal(); });
      elements.uploadClose.onclick = () => elements.uploadPanel.classList.remove("visible");
      elements.filesInput.onchange = () => { addFiles(Array.from(elements.filesInput.files || [])); elements.filesInput.value = ""; };
      elements.folderInput.onchange = () => { addFiles(Array.from(elements.folderInput.files || [])); elements.folderInput.value = ""; };

      window.addEventListener("dragenter", event => {
        if (!hasExternalFiles(event)) return;
        event.preventDefault();
        state.dragDepth += 1;
        elements.dropOverlay.classList.add("visible");
      });
      window.addEventListener("dragover", event => {
        if (!hasExternalFiles(event)) return;
        event.preventDefault();
        event.dataTransfer.dropEffect = "copy";
      });
      window.addEventListener("dragleave", event => {
        if (!hasExternalFiles(event)) return;
        state.dragDepth = Math.max(0, state.dragDepth - 1);
        if (!state.dragDepth) elements.dropOverlay.classList.remove("visible");
      });
      window.addEventListener("drop", async event => {
        if (!hasExternalFiles(event)) return;
        event.preventDefault();
        event.stopPropagation();
        state.dragDepth = 0;
        elements.dropOverlay.classList.remove("visible");
        showToast("Preparing upload...", { duration: 1200 });
        try { addFiles(await droppedItems(event.dataTransfer), state.currentPath); }
        catch (error) { showToast(error.message || "Dropped files could not be read.", { kind: "error", duration: 5000 }); }
      });

      document.addEventListener("pointerdown", event => {
        if (!event.target.closest(".menu") && !event.target.closest("#uploadButton, #sortButton, #viewButton, #moreButton")) closeMenus();
      }, true);
      document.addEventListener("keydown", event => {
        const typing = event.target.matches && event.target.matches("input, textarea, select");
        if (event.key === "Escape") {
          event.preventDefault();
          if (elements.modalBackdrop.classList.contains("open")) closeModal();
          else if (document.querySelector(".menu.open")) closeMenus();
          else clearSelection();
          return;
        }
        if (typing) return;
        if ((event.altKey && event.key === "ArrowLeft") || event.key === "Backspace") {
          event.preventDefault();
          navigateBack();
        } else if (event.altKey && event.key === "ArrowRight") {
          event.preventDefault();
          navigateForward();
        } else if ((event.ctrlKey || event.metaKey) && event.key.toLocaleLowerCase() === "a") {
          event.preventDefault();
          state.selection = new Set(visibleItems().map(item => item.path));
          if (visibleItems()[0]) { state.focusedPath = visibleItems()[0].path; state.anchorIndex = 0; }
          updateSelectionUi();
        } else if (event.key === "Enter") {
          const item = state.items.find(candidate => candidate.path === state.focusedPath) || selectedItems()[0];
          if (item) { event.preventDefault(); openItem(item); }
        } else if (event.key === "Delete" && state.selection.size) {
          event.preventDefault();
          showDeleteDialog();
        } else if (event.key === "F2" && state.selection.size === 1) {
          event.preventDefault();
          showRenameDialog();
        } else if (event.key === "Home" && visibleItems().length) {
          event.preventDefault();
          focusVisibleIndex(0, event.shiftKey);
        } else if (event.key === "End" && visibleItems().length) {
          event.preventDefault();
          focusVisibleIndex(visibleItems().length - 1, event.shiftKey);
        } else if (event.key === "PageDown" || event.key === "PageUp") {
          event.preventDefault();
          elements.results.scrollBy({ top: (event.key === "PageDown" ? 1 : -1) * elements.results.clientHeight * 0.88, behavior: "instant" });
        }
      });

      window.addEventListener("beforeunload", () => {
        stopThumbnailLoading();
        state.thumbnailCache.forEach(url => URL.revokeObjectURL(url));
      });

      async function initialise() {
        document.title = "Sports Cave Files";
        state.searchByPath[state.currentPath] = query.get("q") || state.searchByPath[state.currentPath] || "";
        const requestedPath = state.currentPath;
        const loaded = await loadFolder(requestedPath);
        if (!loaded && requestedPath) {
          state.back = [];
          state.forward = [];
          state.currentPath = "";
          await loadFolder("");
        }
      }

      initialise();
    </script>
  </body>
</html>
