<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * { box-sizing: border-box; }
      html, body {
        background: transparent;
        color: #202124;
        font-family: "Segoe UI", system-ui, sans-serif;
        margin: 0;
        padding: 0;
      }
      .shell {
        border: 1px solid transparent;
        min-height: 38px;
        position: relative;
      }
      .shell.dragover {
        background: rgba(229, 240, 248, 0.95);
        border-color: #7fa6c1;
      }
      .toolbar {
        align-items: center;
        display: flex;
        gap: 3px;
        height: 38px;
        min-height: 38px;
        position: relative;
      }
      button {
        align-items: center;
        background: transparent;
        border: 1px solid transparent;
        border-radius: 4px;
        color: #202124;
        cursor: default;
        display: inline-flex;
        font: 12px "Segoe UI", system-ui, sans-serif;
        gap: 4px;
        height: 30px;
        padding: 0 8px;
      }
      button:hover { background: #eef1f4; border-color: #d5d9dd; }
      button:active, button[aria-pressed="true"] { background: #dcecf7; border-color: #b7d1e3; }
      button:disabled { cursor: default; opacity: .55; }
      .command-icon { color: #4f565d; font-size: 15px; line-height: 1; }
      .hint { color: #6d7277; font-size: 11px; margin-left: auto; padding-right: 6px; }
      .menu-wrap { position: relative; }
      .menu {
        background: #fff;
        border: 1px solid #d5d9dd;
        border-radius: 5px;
        box-shadow: 0 6px 16px rgba(35, 42, 48, .12);
        display: none;
        left: 0;
        min-width: 170px;
        padding: 4px;
        position: absolute;
        top: 32px;
        z-index: 8;
      }
      .menu.open { display: block; }
      .menu button { justify-content: flex-start; width: 100%; }
      .menu select { margin: 4px; width: calc(100% - 8px); }
      .more-menu { left: auto; min-width: 145px; right: 0; }
      select {
        background: #fff;
        border: 1px solid #d6d9dc;
        border-radius: 3px;
        color: #3d4145;
        font: 11.5px "Segoe UI", system-ui, sans-serif;
        height: 26px;
        margin-left: 0;
        padding: 0 5px;
      }
      .folder-glyph {
        background: #e2b84f;
        border-radius: 1px;
        display: inline-block;
        height: 10px;
        position: relative;
        width: 14px;
      }
      .folder-glyph::before {
        background: #e2b84f;
        border-radius: 1px 1px 0 0;
        content: "";
        height: 3px;
        left: 1px;
        position: absolute;
        top: -3px;
        width: 6px;
      }
      input[type="file"] { display: none; }
      .drop-overlay {
        align-items: center;
        background: rgba(234, 242, 248, .97);
        color: #244a64;
        display: none;
        font-size: 12px;
        font-weight: 600;
        inset: 0;
        justify-content: center;
        position: absolute;
        z-index: 3;
      }
      .shell.dragover .drop-overlay { display: flex; }
      .uploads { border-top: 1px solid #e0e2e5; }
      .upload-row {
        align-items: center;
        border-bottom: 1px solid #eff0f1;
        display: grid;
        font-size: 12px;
        grid-template-columns: minmax(300px, 1fr) 105px 178px 148px 86px 78px;
        min-height: 36px;
      }
      .cell {
        align-items: center;
        border-right: 1px solid #eceff1;
        display: flex;
        height: 36px;
        min-width: 0;
        overflow: hidden;
        padding: 0 9px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .cell:last-child { border-right: 0; gap: 3px; justify-content: flex-end; }
      .name { gap: 8px; }
      .file-icon {
        align-items: center;
        background: #d8e5ef;
        border-radius: 2px;
        color: #29485f;
        display: inline-flex;
        flex: 0 0 27px;
        font-size: 8px;
        font-weight: 700;
        height: 30px;
        justify-content: center;
      }
      .file-icon.psd { background: #d7ebff; color: #135c9f; }
      .file-icon.pdf { background: #fbe0e0; color: #a32626; }
      .file-icon.zip { background: #f0e7cd; color: #705716; }
      .file-icon.video { background: #e5ddf5; color: #583b86; }
      .spinner {
        animation: spin .8s linear infinite;
        border: 2px solid #c9d7e0;
        border-radius: 50%;
        border-top-color: #39779e;
        height: 14px;
        width: 14px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .status { color: #4f5960; }
      .failed { color: #a02c2c; }
      .mini { font-size: 11px; height: 25px; padding: 0 5px; }
      .reason {
        color: #8a3333;
        font-size: 11px;
        grid-column: 1 / -1;
        min-height: 22px;
        padding: 3px 44px;
      }
      @media (max-width: 760px) {
        .upload-row { grid-template-columns: minmax(220px, 1fr) 130px 145px 80px 72px; }
        .upload-row .cell:nth-child(3) { display: none; }
        .hint { display: none; }
      }
    </style>
  </head>
  <body>
    <div id="shell" class="shell">
      <div class="toolbar">
        <button id="openButton" type="button" title="Open selected item" disabled><span class="command-icon">&#8599;</span>Open</button>
        <button id="newButton" type="button" title="Create a new folder"><span class="command-icon">+</span>New</button>
        <div class="menu-wrap">
          <button id="uploadButton" type="button" title="Upload to this folder"><span class="command-icon">&#8593;</span>Upload <span aria-hidden="true">&#8964;</span></button>
          <div id="uploadMenu" class="menu">
            <button id="filesButton" type="button"><span class="command-icon">&#8679;</span>Upload files</button>
            <button id="folderButton" type="button"><span class="folder-glyph" aria-hidden="true"></span>Upload folder</button>
            <select id="conflict" aria-label="If a name already exists">
              <option value="cancel">Cancel matching files</option>
              <option value="keep_both">Keep both</option>
              <option value="replace">Replace matching files</option>
            </select>
          </div>
        </div>
        <button id="renameButton" type="button" title="Rename selected item" disabled><span class="command-icon">&#9998;</span>Rename</button>
        <button id="deleteButton" type="button" title="Move selected items to Recycle Bin" disabled><span class="command-icon">&#128465;</span>Delete</button>
        <span id="selectionCount" class="hint" aria-live="polite"></span>
        <div class="menu-wrap">
          <button id="moreButton" type="button" title="More actions" aria-label="More actions"><span class="command-icon">&#8943;</span></button>
          <div id="moreMenu" class="menu more-menu">
            <button id="previewButton" type="button">Preview</button>
            <button id="downloadButton" type="button">Download</button>
            <button id="moreDeleteButton" type="button">Delete</button>
            <button id="propertiesButton" type="button">Properties</button>
            <button id="clearSelectionButton" type="button">Clear selection</button>
          </div>
        </div>
        <span class="hint">Large files supported</span>
      </div>
      <div class="drop-overlay">Drop files into this folder</div>
      <div id="uploads" class="uploads"></div>
      <input id="filesInput" type="file" multiple />
      <input id="folderInput" type="file" multiple webkitdirectory directory />
    </div>

    <script>
      const CHUNK_BYTES = 8 * 1024 * 1024;
      const MAX_CONCURRENT = 2;
      const MAX_THUMBNAIL_CONCURRENT = 4;
      const MAX_CLIENT_THUMBNAILS = 128;
      const state = {
        args: {},
        rows: [],
        queue: [],
        active: 0,
        acknowledged: "",
        completionQueue: [],
        awaitingAck: null,
        workspaceBinding: null,
        workspaceDragDepth: 0,
        workspaceDragDestination: "",
        shellDragDepth: 0,
        rowBindings: [],
        rowBindTimer: 0,
        contextMenu: null,
        clickTimer: 0,
        selection: new Set(),
        anchorIndex: -1,
        focusedIndex: -1,
        selectionSyncTimer: 0,
        selectionRect: null,
        thumbnailObserver: null,
        thumbnailQueue: [],
        thumbnailActive: 0,
        thumbnailCache: new Map(),
        thumbnailControllers: new Set(),
        thumbnailInFlight: new Set(),
        thumbnailFolder: "",
      };
      const shell = document.getElementById("shell");
      const uploads = document.getElementById("uploads");
      const filesInput = document.getElementById("filesInput");
      const folderInput = document.getElementById("folderInput");
      const conflictInput = document.getElementById("conflict");
      const uploadMenu = document.getElementById("uploadMenu");
      const moreMenu = document.getElementById("moreMenu");
      const renameButton = document.getElementById("renameButton");
      const deleteButton = document.getElementById("deleteButton");
      const moreDeleteButton = document.getElementById("moreDeleteButton");
      const selectionCount = document.getElementById("selectionCount");
      const openButton = document.getElementById("openButton");
      const previewButton = document.getElementById("previewButton");
      const downloadButton = document.getElementById("downloadButton");
      const propertiesButton = document.getElementById("propertiesButton");

      function sendMessage(type, data) {
        window.parent.postMessage(Object.assign({ isStreamlitMessage: true, type }, data || {}), "*");
      }
      function setValue(value) { sendMessage("streamlit:setComponentValue", { value }); }
      function setFrameHeight() {
        const height = state.args.show_toolbar === false ? 1 : Math.max(34, document.body.scrollHeight);
        sendMessage("streamlit:setFrameHeight", { height });
      }
      function ready() {
        sendMessage("streamlit:componentReady", { apiVersion: 1 });
        setFrameHeight();
      }
      function safeText(value) {
        return String(value == null ? "" : value).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
      }
      function sizeLabel(bytes) {
        let amount = Number(bytes || 0);
        const units = ["B", "KB", "MB", "GB", "TB"];
        let index = 0;
        while (amount >= 1024 && index < units.length - 1) { amount /= 1024; index += 1; }
        return `${amount < 10 && index ? amount.toFixed(1) : Math.round(amount)} ${units[index]}`;
      }
      function typeInfo(name, mime) {
        const ext = String(name || "").split(".").pop().toLowerCase();
        if (["psd", "psb"].includes(ext)) return ["PSD", "Photoshop file", "psd"];
        if (["tif", "tiff"].includes(ext)) return ["TIF", "TIFF image", ""];
        if (ext === "pdf") return ["PDF", "PDF document", "pdf"];
        if (["zip", "rar", "7z"].includes(ext)) return [ext.toUpperCase(), "Compressed folder", "zip"];
        if (/^video\//.test(mime || "") || ["mp4", "mov", "webm", "avi"].includes(ext)) return [ext.toUpperCase() || "VID", "Video file", "video"];
        if (/^image\//.test(mime || "") || ["jpg", "jpeg", "png", "webp"].includes(ext)) return [ext.toUpperCase() || "IMG", "Image file", ""];
        return [ext.toUpperCase().slice(0, 4) || "FILE", `${ext.toUpperCase() || "File"} file`, ""];
      }
      function progressText(row) {
        if (row.status === "failed") return "Upload failed";
        if (row.status === "queued") return "Waiting";
        const percent = row.size ? Math.min(100, Math.round((row.uploaded / row.size) * 100)) : (row.status === "completed" ? 100 : 0);
        return `Uploading ${percent}% - ${sizeLabel(row.uploaded)} of ${sizeLabel(row.size)}`;
      }
      function emitCommand(eventName, extra) {
        setValue({
          event: eventName,
          nonce: `${Date.now()}-${Math.random()}`,
          current_path: state.args.current_path,
          ...(extra || {}),
        });
      }
      function emitTarget(eventName, item) {
        if (!item || !item.path) return;
        setValue({
          event: eventName,
          nonce: `${Date.now()}-${Math.random()}`,
          current_path: state.args.current_path,
          target_path: item.path,
          target_kind: item.kind,
        });
      }
      function rowItems() {
        return Array.from(state.args.row_items || []);
      }
      function selectedPaths() {
        return Array.from(state.selection);
      }
      function selectedItems() {
        const paths = state.selection;
        return rowItems().filter(item => paths.has(String(item.path || "")));
      }
      function selectedItem() {
        const items = rowItems();
        if (state.focusedIndex >= 0 && items[state.focusedIndex] && state.selection.has(String(items[state.focusedIndex].path || ""))) {
          return items[state.focusedIndex];
        }
        return selectedItems()[0] || null;
      }
      function isTypingTarget(target) {
        const tagName = String(target && target.tagName || "").toLowerCase();
        return ["input", "textarea", "select"].includes(tagName) || Boolean(target && target.isContentEditable);
      }
      function syncSelectionSoon() {
        window.clearTimeout(state.selectionSyncTimer);
        state.selectionSyncTimer = window.setTimeout(() => {
          emitCommand("selection_changed", {
            selected_paths: selectedPaths(),
            focused_path: selectedItem() ? selectedItem().path : "",
          });
        }, 140);
      }
      function explicitDownload(item) {
        if (!item || item.kind === "folder") return;
        const url = `/api/files-download?path=${encodeURIComponent(item.path)}`;
        window.parent.open(url, "_blank", "noopener,noreferrer");
      }

      function closeDesktopHelperNotice() {
        let parentDocument;
        try { parentDocument = window.parent.document; } catch (_) { return; }
        const notice = parentDocument.querySelector(".sc-files-helper-notice");
        if (notice) notice.remove();
      }

      function invokeDesktopHelper(item, { kind="file" } = {}) {
        if (!item || !item.desktop_relative_path) {
          return;
        }
        closeDesktopHelperNotice();
        const protocolUrl = `sports-cave-files://open?path=${encodeURIComponent(item.desktop_relative_path)}&kind=${encodeURIComponent(kind)}`;
        const protocolLink = window.parent.document.createElement("a");
        protocolLink.hidden = true;
        protocolLink.setAttribute("aria-hidden", "true");
        protocolLink.href = protocolUrl;
        window.parent.document.body.appendChild(protocolLink);
        protocolLink.click();
        protocolLink.remove();
      }

      function openItem(item) {
        if (!item) return;
        if (item.kind === "folder") {
          emitTarget("open_requested", item);
          return;
        }
        invokeDesktopHelper(item, { kind: "file" });
      }
      function render() {
        uploads.innerHTML = state.rows.map(row => {
          const [badge, type, className] = typeInfo(row.name, row.file.type);
          const actions = row.status === "failed"
            ? `<button class="mini" data-retry="${safeText(row.clientId)}">Retry</button><button class="mini" data-remove="${safeText(row.clientId)}">Remove</button>`
            : `<span class="spinner" aria-label="Uploading"></span>`;
          const reason = row.status === "failed" && row.error ? `<div class="reason">${safeText(row.error)}</div>` : "";
          return `<div class="upload-row">
            <div class="cell name"><span class="file-icon ${className}">${safeText(badge)}</span><span>${safeText(row.name)}</span></div>
            <div class="cell status ${row.status === "failed" ? "failed" : ""}">${safeText(progressText(row))}</div>
            <div class="cell"></div>
            <div class="cell">${safeText(type)}</div>
            <div class="cell">${safeText(sizeLabel(row.size))}</div>
            <div class="cell">${actions}</div>${reason}
          </div>`;
        }).join("");
        uploads.style.display = state.rows.length ? "block" : "none";
        uploads.querySelectorAll("[data-retry]").forEach(button => button.onclick = () => retryRow(button.dataset.retry));
        uploads.querySelectorAll("[data-remove]").forEach(button => button.onclick = () => removeRow(button.dataset.remove));
        setFrameHeight();
      }
      function createRow(file, relativePath, destinationPath) {
        return {
          clientId: (crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`),
          file,
          name: file.name,
          relativePath: relativePath || file.webkitRelativePath || file.name,
          size: file.size,
          uploaded: 0,
          status: "queued",
          error: "",
          uploadId: "",
          uploadSecret: "",
          errorCode: "",
          destinationPath: String(destinationPath || state.args.current_path || ""),
        };
      }
      function addFiles(items, destinationPath) {
        const destination = String(destinationPath || state.args.current_path || "");
        const rows = items.map(item => createRow(item.file || item, item.relativePath, destination));
        if (!rows.length) return;
        state.rows.push(...rows);
        state.queue.push(...rows);
        render();
        drainQueue();
      }
      async function apiJson(path, options) {
        const response = await fetch(path, Object.assign({ credentials: "same-origin" }, options || {}));
        let payload = {};
        try { payload = await response.json(); } catch (_) {}
        if (!response.ok || payload.ok === false) {
          const error = new Error(payload.message || "Upload could not continue.");
          error.code = payload.code || "upload_error";
          error.offset = payload.offset;
          throw error;
        }
        return payload;
      }
      async function startUpload(row) {
        const payload = await apiJson("/api/files-upload/start", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            current_path: row.destinationPath,
            relative_path: row.relativePath,
            size: row.size,
            conflict: conflictInput.value || "cancel",
          }),
        });
        row.uploadId = payload.upload_id;
        row.uploadSecret = payload.upload_secret;
        row.uploaded = Number(payload.offset || 0);
      }
      async function uploadChunk(row, blob, final) {
        const headers = {
          "Content-Type": "application/octet-stream",
          "X-Upload-Id": row.uploadId,
          "X-Upload-Secret": row.uploadSecret,
          "X-Upload-Offset": String(row.uploaded),
          "X-Upload-Final": final ? "true" : "false",
        };
        for (let attempt = 0; attempt < 3; attempt += 1) {
          try {
            return await apiJson("/api/files-upload/chunk", { method: "POST", headers, body: blob });
          } catch (error) {
            if (error.code === "offset_mismatch") {
              const status = await uploadStatus(row);
              row.uploaded = Number(status.offset || row.uploaded);
              return status;
            }
            if (attempt === 2) throw error;
            await new Promise(resolve => setTimeout(resolve, 500 * (attempt + 1)));
          }
        }
      }
      async function uploadStatus(row) {
        return apiJson(`/api/files-upload/status?upload_id=${encodeURIComponent(row.uploadId)}`, {
          headers: { "X-Upload-Secret": row.uploadSecret },
        });
      }
      async function runRow(row) {
        row.status = "uploading";
        row.error = "";
        row.errorCode = "";
        render();
        try {
          if (!row.uploadId) await startUpload(row);
          else {
            const status = await uploadStatus(row);
            row.uploaded = Number(status.offset || 0);
            if (status.state === "completed") {
              row.status = "completed";
              completeRow(row, status);
              return;
            }
          }
          while (row.uploaded < row.size || (row.size === 0 && row.uploaded === 0)) {
            const end = Math.min(row.size, row.uploaded + CHUNK_BYTES);
            const final = end >= row.size;
            const payload = await uploadChunk(row, row.file.slice(row.uploaded, end), final);
            row.uploaded = Number(payload.offset || end);
            render();
            if (payload.state === "completed" || final) {
              row.status = "completed";
              completeRow(row, payload);
              return;
            }
          }
        } catch (error) {
          row.status = "failed";
          row.error = error.message || "Upload interrupted. Retry to continue.";
          row.errorCode = error.code || "upload_error";
          render();
        }
      }
      function completeRow(row, payload) {
        render();
        row.completionPayload = payload;
        if (!state.completionQueue.includes(row) && (!state.awaitingAck || state.awaitingAck.row !== row)) {
          state.completionQueue.push(row);
        }
        flushCompletion();
      }
      function flushCompletion() {
        if (state.awaitingAck || !state.completionQueue.length) return;
        const row = state.completionQueue.shift();
        const nonce = `${Date.now()}-${Math.random()}`;
        state.awaitingAck = { nonce, row };
        setValue({
          event: "upload_completed",
          nonce,
          current_path: row.destinationPath,
          metadata: (row.completionPayload || {}).metadata || {},
          name: row.name,
        });
      }
      function drainQueue() {
        while (state.active < MAX_CONCURRENT && state.queue.length) {
          const row = state.queue.shift();
          state.active += 1;
          runRow(row).finally(() => { state.active -= 1; drainQueue(); });
        }
      }
      function retryRow(clientId) {
        const row = state.rows.find(item => item.clientId === clientId);
        if (!row) return;
        if (row.errorCode === "upload_missing") {
          row.uploadId = "";
          row.uploadSecret = "";
          row.uploaded = 0;
        }
        row.status = "queued";
        row.error = "";
        row.errorCode = "";
        state.queue.push(row);
        render();
        drainQueue();
      }
      async function removeRow(clientId) {
        const row = state.rows.find(item => item.clientId === clientId);
        if (row && row.uploadId) {
          try {
            await apiJson("/api/files-upload/remove", {
              method: "POST",
              headers: { "Content-Type": "application/json", "X-Upload-Secret": row.uploadSecret },
              body: JSON.stringify({ upload_id: row.uploadId }),
            });
          } catch (_) {}
        }
        state.rows = state.rows.filter(item => item.clientId !== clientId);
        render();
      }
      async function walkEntry(entry, prefix) {
        if (entry.isFile) {
          const file = await new Promise((resolve, reject) => entry.file(resolve, reject));
          return [{ file, relativePath: `${prefix}${file.name}` }];
        }
        if (!entry.isDirectory) return [];
        const reader = entry.createReader();
        const children = [];
        while (true) {
          const batch = await new Promise((resolve, reject) => reader.readEntries(resolve, reject));
          if (!batch.length) break;
          children.push(...batch);
        }
        const nested = await Promise.all(children.map(child => walkEntry(child, `${prefix}${entry.name}/`)));
        return nested.flat();
      }
      async function droppedItems(dataTransfer) {
        const entries = Array.from(dataTransfer.items || []).map(item => item.webkitGetAsEntry && item.webkitGetAsEntry()).filter(Boolean);
        if (entries.length) return (await Promise.all(entries.map(entry => walkEntry(entry, "")))).flat();
        return Array.from(dataTransfer.files || []).map(file => ({ file, relativePath: file.name }));
      }

      function hasExternalFiles(event) {
        const transfer = event && event.dataTransfer;
        return Boolean(transfer && Array.from(transfer.types || []).includes("Files"));
      }

      function currentFolderName(path) {
        const parts = String(path || "").split("/").filter(Boolean);
        return parts.length ? parts[parts.length - 1] : "this folder";
      }

      function closeContextMenu() {
        if (state.contextMenu && state.contextMenu.parentNode) {
          state.contextMenu.parentNode.removeChild(state.contextMenu);
        }
        state.contextMenu = null;
      }

      function updateSelectionUi() {
        const binding = state.workspaceBinding;
        if (!binding) return;
        const rows = Array.from(binding.workspace.querySelectorAll('div[class*="st-key-files-row-native-"]'));
        rows.forEach((row, index) => {
          const item = rowItems()[index];
          const selected = Boolean(item && state.selection.has(String(item.path || "")));
          row.classList.toggle("sc-files-client-selected", selected);
          row.classList.toggle("sc-files-client-focused", index === state.focusedIndex);
          row.setAttribute("aria-selected", selected ? "true" : "false");
          row.tabIndex = index === state.focusedIndex ? 0 : -1;
        });
        const count = state.selection.size;
        selectionCount.textContent = count > 1 ? `${count} items selected` : "";
        const chosen = selectedItems();
        const canDelete = Boolean(state.args.can_delete) && count > 0 && chosen.every(item => !item.protected);
        openButton.disabled = count !== 1;
        renameButton.disabled = count !== 1;
        deleteButton.disabled = !canDelete;
        moreDeleteButton.disabled = !canDelete;
        const only = selectedItem();
        previewButton.disabled = count !== 1 || !only || only.kind === "folder" || !only.preview_supported;
        downloadButton.disabled = count !== 1 || !only || only.kind === "folder";
        propertiesButton.disabled = count !== 1;
        document.getElementById("clearSelectionButton").disabled = count === 0;
      }

      function setSingleSelection(index, { sync=true } = {}) {
        const item = rowItems()[index];
        state.selection = new Set(item && item.path ? [String(item.path)] : []);
        state.anchorIndex = item ? index : -1;
        state.focusedIndex = item ? index : -1;
        updateSelectionUi();
        if (sync) syncSelectionSoon();
      }

      function toggleSelection(index) {
        const item = rowItems()[index];
        if (!item || !item.path) return;
        const path = String(item.path);
        if (state.selection.has(path)) state.selection.delete(path);
        else state.selection.add(path);
        state.anchorIndex = index;
        state.focusedIndex = index;
        updateSelectionUi();
        syncSelectionSoon();
      }

      function selectRange(index, { additive=false } = {}) {
        const items = rowItems();
        if (!items.length) return;
        const anchor = state.anchorIndex >= 0 ? state.anchorIndex : (state.focusedIndex >= 0 ? state.focusedIndex : index);
        const next = additive ? new Set(state.selection) : new Set();
        for (let cursor = Math.min(anchor, index); cursor <= Math.max(anchor, index); cursor += 1) {
          if (items[cursor] && items[cursor].path) next.add(String(items[cursor].path));
        }
        state.selection = next;
        state.focusedIndex = index;
        updateSelectionUi();
        syncSelectionSoon();
      }

      function selectAllVisible() {
        state.selection = new Set(rowItems().map(item => String(item.path || "")).filter(Boolean));
        state.anchorIndex = state.selection.size ? 0 : -1;
        state.focusedIndex = state.selection.size ? 0 : -1;
        updateSelectionUi();
        syncSelectionSoon();
      }

      function clearClientSelection({ sync=true } = {}) {
        state.selection.clear();
        state.anchorIndex = -1;
        state.focusedIndex = -1;
        updateSelectionUi();
        if (sync) emitCommand("clear_selection");
      }

      function stopThumbnailLoading({ cancel=true } = {}) {
        if (state.thumbnailObserver) state.thumbnailObserver.disconnect();
        state.thumbnailObserver = null;
        state.thumbnailQueue = [];
        if (cancel) {
          state.thumbnailControllers.forEach(controller => controller.abort());
          state.thumbnailControllers.clear();
        }
      }

      function rememberThumbnail(key, url) {
        if (state.thumbnailCache.has(key)) {
          const previous = state.thumbnailCache.get(key);
          if (previous !== url) URL.revokeObjectURL(previous);
          state.thumbnailCache.delete(key);
        }
        state.thumbnailCache.set(key, url);
        while (state.thumbnailCache.size > MAX_CLIENT_THUMBNAILS) {
          const oldestKey = state.thumbnailCache.keys().next().value;
          URL.revokeObjectURL(state.thumbnailCache.get(oldestKey));
          state.thumbnailCache.delete(oldestKey);
        }
      }

      function installThumbnail(row, item, objectUrl) {
        if (!row || !row.isConnected || !objectUrl) return;
        const firstButton = row.querySelector('[data-testid="stColumn"]:first-child button');
        if (!firstButton) return;
        let image = firstButton.querySelector(".sc-files-thumbnail");
        if (!image) {
          image = row.ownerDocument.createElement("img");
          image.className = "sc-files-thumbnail";
          image.alt = "";
          image.setAttribute("aria-hidden", "true");
          firstButton.prepend(image);
        }
        image.src = objectUrl;
        row.classList.add("sc-files-thumbnail-loaded");
      }

      function installThumbnailForCurrentRow(key, objectUrl) {
        const binding = state.workspaceBinding;
        if (!binding || !binding.workspace.isConnected) return;
        const rows = Array.from(
          binding.workspace.querySelectorAll('div[class*="st-key-files-row-native-"]')
        );
        const items = rowItems();
        rows.forEach((row, index) => {
          const item = items[index];
          if (item && String(item.thumbnail_key || item.thumbnail_url) === key) {
            installThumbnail(row, item, objectUrl);
          }
        });
      }

      async function fetchThumbnail(task) {
        const controller = new AbortController();
        state.thumbnailControllers.add(controller);
        try {
          const response = await fetch(task.item.thumbnail_url, {
            credentials: "same-origin",
            signal: controller.signal,
          });
          if (!response.ok) return;
          const blob = await response.blob();
          if (!blob.type.startsWith("image/") || state.thumbnailFolder !== task.folder) return;
          const objectUrl = URL.createObjectURL(blob);
          rememberThumbnail(task.key, objectUrl);
          installThumbnailForCurrentRow(task.key, objectUrl);
        } catch (error) {
          if (error && error.name !== "AbortError") {
            // File-type icons remain in place when Dropbox has no thumbnail.
          }
        } finally {
          state.thumbnailControllers.delete(controller);
          state.thumbnailInFlight.delete(task.key);
          state.thumbnailActive = Math.max(0, state.thumbnailActive - 1);
          drainThumbnailQueue();
        }
      }

      function drainThumbnailQueue() {
        while (state.thumbnailActive < MAX_THUMBNAIL_CONCURRENT && state.thumbnailQueue.length) {
          const task = state.thumbnailQueue.shift();
          if (!task || !task.row.isConnected || task.folder !== state.thumbnailFolder) continue;
          if (state.thumbnailInFlight.has(task.key)) continue;
          state.thumbnailInFlight.add(task.key);
          state.thumbnailActive += 1;
          fetchThumbnail(task);
        }
      }

      function setupLazyThumbnails(rows, items) {
        stopThumbnailLoading({ cancel: state.thumbnailFolder !== String(state.args.current_path || "") });
        state.thumbnailFolder = String(state.args.current_path || "");
        const root = state.workspaceBinding && (
          state.workspaceBinding.details
          || state.workspaceBinding.workspace.querySelector(".st-key-files-details-list")
        );
        if (!root || !window.parent.IntersectionObserver) return;
        state.thumbnailObserver = new window.parent.IntersectionObserver(records => {
          records.forEach(record => {
            if (!record.isIntersecting) return;
            state.thumbnailObserver.unobserve(record.target);
            const index = rows.indexOf(record.target);
            const item = items[index];
            if (!item || !item.thumbnail_url) return;
            const key = String(item.thumbnail_key || item.thumbnail_url);
            const cached = state.thumbnailCache.get(key);
            if (cached) {
              state.thumbnailCache.delete(key);
              state.thumbnailCache.set(key, cached);
              installThumbnail(record.target, item, cached);
              return;
            }
            if (state.thumbnailInFlight.has(key)) return;
            state.thumbnailQueue.push({ row: record.target, item, key, folder: state.thumbnailFolder });
          });
          drainThumbnailQueue();
        }, { root, rootMargin: "192px 0px", threshold: 0.01 });
        rows.forEach((row, index) => {
          if (items[index] && items[index].thumbnail_url) state.thumbnailObserver.observe(row);
        });
      }

      function contextAction(menu, label, callback) {
        const button = menu.ownerDocument.createElement("button");
        button.type = "button";
        button.textContent = label;
        button.addEventListener("click", event => {
          event.preventDefault();
          event.stopPropagation();
          closeContextMenu();
          callback();
        });
        menu.appendChild(button);
      }

      function showContextMenu(item, rowElement, clientX, clientY, rowIndex) {
        const binding = state.workspaceBinding;
        if (!binding || !item) return;
        closeContextMenu();
        const itemPath = String(item.path || "");
        if (!state.selection.has(itemPath)) setSingleSelection(rowIndex);
        else {
          state.focusedIndex = rowIndex;
          updateSelectionUi();
        }
        const chosen = selectedItems();
        const menu = binding.document.createElement("div");
        menu.className = "sc-files-context-menu";
        menu.setAttribute("role", "menu");
        if (chosen.length === 1) contextAction(menu, "Open", () => openItem(item));
        if (chosen.length === 1 && item.kind === "folder" && item.desktop_relative_path) {
          contextAction(menu, "Open in File Explorer", () => invokeDesktopHelper(item, { kind: "folder" }));
        }
        if (chosen.length === 1 && item.kind !== "folder") {
          if (item.preview_supported) contextAction(menu, "Preview", () => emitTarget("preview_requested", item));
        }
        if (chosen.length === 1) contextAction(menu, "Rename", () => emitTarget("rename_requested", item));
        if (chosen.length === 1 && item.kind !== "folder") {
          contextAction(menu, "Download", () => explicitDownload(item));
        }
        if (state.args.can_delete && chosen.every(selected => !selected.protected)) contextAction(menu, "Delete", () => showDeleteConfirmation());
        if (chosen.length === 1) contextAction(menu, "Properties", () => emitTarget("properties_requested", item));
        binding.document.body.appendChild(menu);
        const maxLeft = Math.max(4, binding.document.documentElement.clientWidth - menu.offsetWidth - 6);
        const maxTop = Math.max(4, binding.document.documentElement.clientHeight - menu.offsetHeight - 6);
        menu.style.left = `${Math.min(Math.max(4, clientX), maxLeft)}px`;
        menu.style.top = `${Math.min(Math.max(4, clientY), maxTop)}px`;
        state.contextMenu = menu;
        const first = menu.querySelector("button");
        if (first) first.focus();
      }

      function closeDeleteConfirmation() {
        const binding = state.workspaceBinding;
        if (!binding) return;
        const dialog = binding.document.querySelector(".sc-files-delete-backdrop");
        if (dialog) dialog.remove();
      }

      function deleteConfirmationText(items) {
        if (items.length === 1) return `Move '${items[0].name}' to the Recycle Bin?`;
        return `Move these ${items.length} items to the Recycle Bin?`;
      }

      async function confirmDelete(items, yesButton, statusNode) {
        yesButton.disabled = true;
        statusNode.textContent = "Moving items...";
        try {
          const payload = await apiJson("/api/files-delete", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              current_path: state.args.current_path,
              paths: items.map(item => item.path),
            }),
          });
          const successful = Array.from(payload.successful || []).map(item => String(item.path || "")).filter(Boolean);
          const failed = Array.from(payload.failed || []).map(item => String(item.path || "")).filter(Boolean);
          state.selection = new Set(failed);
          state.focusedIndex = failed.length ? rowItems().findIndex(item => String(item.path || "") === failed[0]) : -1;
          state.anchorIndex = state.focusedIndex;
          updateSelectionUi();
          closeDeleteConfirmation();
          const movedCount = successful.length;
          const failedCount = failed.length;
          const message = failedCount
            ? `${movedCount} item${movedCount === 1 ? " was" : "s were"} moved. ${failedCount} could not be removed. Select Delete to retry.`
            : `${movedCount} item${movedCount === 1 ? "" : "s"} moved to Recycle Bin.`;
          emitCommand("delete_completed", {
            successful_paths: successful,
            failed_paths: failed,
            message,
          });
        } catch (error) {
          yesButton.disabled = false;
          statusNode.textContent = error.message || "These items could not be removed right now.";
        }
      }

      function showDeleteConfirmation() {
        const binding = state.workspaceBinding;
        const items = selectedItems();
        if (!binding || !items.length || !state.args.can_delete || items.some(item => item.protected)) return;
        closeContextMenu();
        closeDeleteConfirmation();
        const backdrop = binding.document.createElement("div");
        backdrop.className = "sc-files-delete-backdrop";
        const dialog = binding.document.createElement("div");
        dialog.className = "sc-files-delete-dialog";
        dialog.setAttribute("role", "dialog");
        dialog.setAttribute("aria-modal", "true");
        dialog.setAttribute("aria-labelledby", "sc-files-delete-title");
        const title = binding.document.createElement("h3");
        title.id = "sc-files-delete-title";
        title.textContent = deleteConfirmationText(items);
        const support = binding.document.createElement("p");
        support.textContent = "Items are removed from this folder and may be recoverable from Dropbox Deleted Files.";
        const status = binding.document.createElement("div");
        status.className = "sc-files-delete-status";
        status.setAttribute("aria-live", "polite");
        const actions = binding.document.createElement("div");
        actions.className = "sc-files-delete-actions";
        const yes = binding.document.createElement("button");
        yes.type = "button";
        yes.textContent = "Yes, move to Recycle Bin";
        const no = binding.document.createElement("button");
        no.type = "button";
        no.textContent = "No";
        no.className = "primary-focus";
        no.onclick = closeDeleteConfirmation;
        yes.onclick = () => confirmDelete(items, yes, status);
        actions.append(yes, no);
        dialog.append(title, support, status, actions);
        backdrop.appendChild(dialog);
        binding.document.body.appendChild(backdrop);
        backdrop.addEventListener("pointerdown", event => {
          if (event.target === backdrop) closeDeleteConfirmation();
        });
        dialog.addEventListener("keydown", event => {
          if (event.key === "Escape") {
            event.preventDefault();
            closeDeleteConfirmation();
          }
        });
        no.focus();
      }

      function unbindFileRows() {
        state.rowBindings.forEach(binding => {
          binding.row.removeEventListener("click", binding.onClick, true);
          binding.row.removeEventListener("dblclick", binding.onDoubleClick, true);
          binding.row.removeEventListener("contextmenu", binding.onContextMenu, true);
          binding.row.removeEventListener("keydown", binding.onKeyDown, true);
        });
        state.rowBindings = [];
      }

      function bindFileRows() {
        const binding = state.workspaceBinding;
        if (!binding || !binding.workspace.isConnected) return;
        unbindFileRows();
        const rows = Array.from(
          binding.workspace.querySelectorAll('div[class*="st-key-files-row-native-"]')
        );
        const items = Array.from(state.args.row_items || []);
        rows.forEach((row, index) => {
          const item = items[index];
          if (!item) return;
          row.tabIndex = index === state.focusedIndex ? 0 : -1;
          row.setAttribute("role", "row");
          row.setAttribute("aria-label", `${item.kind === "folder" ? "Folder" : "File"}: ${item.name}`);
          row.setAttribute(
            "aria-selected",
            state.selection.has(String(item.path || "")) ? "true" : "false"
          );
          const isMoreButton = event => {
            const buttons = Array.from(row.querySelectorAll("button"));
            return event.target.closest("button") === buttons[buttons.length - 1];
          };
          const onClick = event => {
            event.preventDefault();
            event.stopImmediatePropagation();
            if (isMoreButton(event)) {
              const rect = event.target.closest("button").getBoundingClientRect();
              showContextMenu(item, row, rect.left, rect.bottom + 2, index);
              return;
            }
            closeContextMenu();
            window.clearTimeout(state.clickTimer);
            if (event.shiftKey) selectRange(index, { additive: event.ctrlKey || event.metaKey });
            else if (event.ctrlKey || event.metaKey) toggleSelection(index);
            else setSingleSelection(index);
          };
          const onDoubleClick = event => {
            event.preventDefault();
            event.stopImmediatePropagation();
            window.clearTimeout(state.clickTimer);
            window.clearTimeout(state.selectionSyncTimer);
            closeContextMenu();
            if (!state.selection.has(String(item.path || ""))) setSingleSelection(index, { sync: false });
            state.focusedIndex = index;
            openItem(item);
          };
          const onContextMenu = event => {
            event.preventDefault();
            event.stopImmediatePropagation();
            window.clearTimeout(state.clickTimer);
            showContextMenu(item, row, event.clientX, event.clientY, index);
          };
          const onKeyDown = event => {
            if (isTypingTarget(event.target)) return;
            if (event.key === "Enter") {
              event.preventDefault();
              event.stopImmediatePropagation();
              openItem(item);
            } else if (event.key === "ArrowDown" || event.key === "ArrowUp") {
              event.preventDefault();
              event.stopImmediatePropagation();
              const direction = event.key === "ArrowDown" ? 1 : -1;
              const destination = Math.max(0, Math.min(rowItems().length - 1, index + direction));
              if (event.shiftKey) selectRange(destination);
              else setSingleSelection(destination);
              const targetRow = rows[destination];
              if (targetRow) targetRow.focus({ preventScroll: true });
            } else if (event.key === "Delete") {
              event.preventDefault();
              if (state.args.can_delete) showDeleteConfirmation();
            } else if (event.key === "F2") {
              event.preventDefault();
              if (state.selection.size === 1) emitTarget("rename_requested", selectedItem());
            } else if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "a") {
              event.preventDefault();
              selectAllVisible();
            } else if (event.key === "Escape") {
              event.preventDefault();
              closeContextMenu();
              clearClientSelection();
            }
          };
          row.addEventListener("click", onClick, true);
          row.addEventListener("dblclick", onDoubleClick, true);
          row.addEventListener("contextmenu", onContextMenu, true);
          row.addEventListener("keydown", onKeyDown, true);
          state.rowBindings.push({ row, onClick, onDoubleClick, onContextMenu, onKeyDown });
        });
        setupLazyThumbnails(rows, items);
        updateSelectionUi();
      }

      function scheduleRowBinding() {
        window.clearTimeout(state.rowBindTimer);
        state.rowBindTimer = window.setTimeout(bindFileRows, 30);
      }

      function removeWorkspaceOverlay() {
        const binding = state.workspaceBinding;
        if (!binding) return;
        if (binding.overlay && binding.overlay.parentNode) binding.overlay.parentNode.removeChild(binding.overlay);
        if (binding.details) binding.details.classList.remove("sc-files-drop-active");
        binding.overlay = null;
      }

      function showWorkspaceOverlay() {
        const binding = state.workspaceBinding;
        if (!binding || !binding.workspace.isConnected) return;
        const details = binding.workspace.querySelector(".st-key-files-details-list");
        if (!details) return;
        if (binding.details !== details) {
          removeWorkspaceOverlay();
          binding.details = details;
        }
        details.classList.add("sc-files-drop-active");
        if (!binding.overlay || !binding.overlay.isConnected) {
          const overlay = binding.document.createElement("div");
          overlay.className = "sc-files-workspace-drop-overlay";
          overlay.setAttribute("role", "status");
          details.appendChild(overlay);
          binding.overlay = overlay;
        }
        binding.overlay.textContent = `Drop to upload to ${currentFolderName(state.workspaceDragDestination)}`;
      }

      function resetWorkspaceDrag() {
        state.workspaceDragDepth = 0;
        state.workspaceDragDestination = "";
        removeWorkspaceOverlay();
      }

      function cleanupWorkspaceDropTarget() {
        const binding = state.workspaceBinding;
        if (!binding) return;
        binding.workspace.removeEventListener("dragenter", binding.onDragEnter);
        binding.workspace.removeEventListener("dragover", binding.onDragOver);
        binding.workspace.removeEventListener("dragleave", binding.onDragLeave);
        binding.workspace.removeEventListener("drop", binding.onDrop);
        binding.document.removeEventListener("dragover", binding.onPageDragOver, true);
        binding.document.removeEventListener("drop", binding.onPageDrop, true);
        if (binding.observer) binding.observer.disconnect();
        if (binding.onDocumentPointerDown) {
          binding.document.removeEventListener("pointerdown", binding.onDocumentPointerDown, true);
        }
        if (binding.onDocumentKeyDown) {
          binding.document.removeEventListener("keydown", binding.onDocumentKeyDown, true);
        }
        if (binding.onWorkspacePointerDown) {
          binding.workspace.removeEventListener("pointerdown", binding.onWorkspacePointerDown, true);
        }
        if (binding.onDocumentPointerMove) {
          binding.document.removeEventListener("pointermove", binding.onDocumentPointerMove, true);
        }
        if (binding.onDocumentPointerUp) {
          binding.document.removeEventListener("pointerup", binding.onDocumentPointerUp, true);
        }
        unbindFileRows();
        stopThumbnailLoading();
        closeDesktopHelperNotice();
        closeContextMenu();
        closeDeleteConfirmation();
        if (state.selectionRect && state.selectionRect.element) state.selectionRect.element.remove();
        state.selectionRect = null;
        removeWorkspaceOverlay();
        state.workspaceBinding = null;
        state.workspaceDragDepth = 0;
        state.workspaceDragDestination = "";
      }

      function bindWorkspaceDropTarget() {
        cleanupWorkspaceDropTarget();
        let parentDocument;
        try {
          parentDocument = window.parent.document;
        } catch (_) {
          return;
        }
        const workspace = parentDocument.querySelector(".st-key-files-explorer");
        if (!workspace) return;
        const binding = {
          document: parentDocument,
          workspace,
          details: workspace.querySelector(".st-key-files-details-list"),
          overlay: null,
          observer: null,
        };
        const isActive = () => (
          workspace.isConnected && parentDocument.querySelector(".st-key-files-explorer") === workspace
        );
        binding.onPageDragOver = event => {
          if (isActive() && hasExternalFiles(event)) event.preventDefault();
        };
        binding.onPageDrop = event => {
          if (isActive() && hasExternalFiles(event)) event.preventDefault();
        };
        binding.onDragEnter = event => {
          if (!hasExternalFiles(event)) return;
          event.preventDefault();
          if (state.workspaceDragDepth === 0) {
            state.workspaceDragDestination = String(state.args.current_path || "");
          }
          state.workspaceDragDepth += 1;
          showWorkspaceOverlay();
        };
        binding.onDragOver = event => {
          if (!hasExternalFiles(event)) return;
          event.preventDefault();
          event.dataTransfer.dropEffect = "copy";
          showWorkspaceOverlay();
        };
        binding.onDragLeave = event => {
          if (!state.workspaceDragDepth) return;
          state.workspaceDragDepth = Math.max(0, state.workspaceDragDepth - 1);
          if (state.workspaceDragDepth === 0) resetWorkspaceDrag();
        };
        binding.onDrop = async event => {
          if (!hasExternalFiles(event)) return;
          event.preventDefault();
          event.stopPropagation();
          const destination = state.workspaceDragDestination || String(state.args.current_path || "");
          const transfer = event.dataTransfer;
          resetWorkspaceDrag();
          addFiles(await droppedItems(transfer), destination);
        };
        workspace.addEventListener("dragenter", binding.onDragEnter);
        workspace.addEventListener("dragover", binding.onDragOver);
        workspace.addEventListener("dragleave", binding.onDragLeave);
        workspace.addEventListener("drop", binding.onDrop);
        parentDocument.addEventListener("dragover", binding.onPageDragOver, true);
        parentDocument.addEventListener("drop", binding.onPageDrop, true);
        binding.onDocumentPointerDown = event => {
          if (state.contextMenu && !state.contextMenu.contains(event.target)) closeContextMenu();
        };
        parentDocument.addEventListener("pointerdown", binding.onDocumentPointerDown, true);
        binding.onWorkspacePointerDown = event => {
          if (event.button !== 0 || isTypingTarget(event.target)) return;
          if (event.target.closest('div[class*="st-key-files-row-native-"]')) return;
          if (event.target.closest("button, a, iframe, .sc-files-context-menu, .sc-files-delete-dialog")) return;
          const details = event.target.closest(".st-key-files-details-list");
          if (!details) return;
          state.selectionRect = {
            active: false,
            additive: event.ctrlKey || event.metaKey,
            base: new Set(event.ctrlKey || event.metaKey ? state.selection : []),
            startX: event.clientX,
            startY: event.clientY,
            element: null,
          };
          event.preventDefault();
        };
        workspace.addEventListener("pointerdown", binding.onWorkspacePointerDown, true);
        binding.onDocumentPointerMove = event => {
          const drag = state.selectionRect;
          if (!drag) return;
          const distance = Math.hypot(event.clientX - drag.startX, event.clientY - drag.startY);
          if (!drag.active && distance < 5) return;
          if (!drag.active) {
            drag.active = true;
            drag.element = parentDocument.createElement("div");
            drag.element.className = "sc-files-selection-rectangle";
            parentDocument.body.appendChild(drag.element);
          }
          event.preventDefault();
          const left = Math.min(drag.startX, event.clientX);
          const top = Math.min(drag.startY, event.clientY);
          const right = Math.max(drag.startX, event.clientX);
          const bottom = Math.max(drag.startY, event.clientY);
          Object.assign(drag.element.style, {
            left: `${left}px`, top: `${top}px`, width: `${right - left}px`, height: `${bottom - top}px`,
          });
          const next = new Set(drag.base);
          const rows = Array.from(workspace.querySelectorAll('div[class*="st-key-files-row-native-"]'));
          rows.forEach((row, index) => {
            const bounds = row.getBoundingClientRect();
            if (bounds.left <= right && bounds.right >= left && bounds.top <= bottom && bounds.bottom >= top) {
              const item = rowItems()[index];
              if (item && item.path) next.add(String(item.path));
            }
          });
          state.selection = next;
          state.focusedIndex = rows.findIndex((row, index) => {
            const item = rowItems()[index];
            return item && next.has(String(item.path || ""));
          });
          updateSelectionUi();
        };
        binding.onDocumentPointerUp = () => {
          const drag = state.selectionRect;
          if (!drag) return;
          if (drag.element) drag.element.remove();
          state.selectionRect = null;
          if (drag.active) syncSelectionSoon();
          else clearClientSelection();
        };
        parentDocument.addEventListener("pointermove", binding.onDocumentPointerMove, true);
        parentDocument.addEventListener("pointerup", binding.onDocumentPointerUp, true);
        binding.onDocumentKeyDown = event => {
          if (!isActive()) return;
          if (isTypingTarget(event.target)) return;
          if (event.key === "Escape") {
            event.preventDefault();
            if (state.contextMenu) closeContextMenu();
            else if (parentDocument.querySelector(".sc-files-delete-backdrop")) closeDeleteConfirmation();
            else clearClientSelection();
            return;
          }
          if (event.target && event.target.closest && event.target.closest('div[class*="st-key-files-row-native-"]')) return;
          if (event.key === "Enter" && selectedItem()) {
            event.preventDefault();
            openItem(selectedItem());
          } else if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "a") {
            event.preventDefault();
            selectAllVisible();
          } else if (event.key === "Delete" && state.selection.size) {
            event.preventDefault();
            if (state.args.can_delete) showDeleteConfirmation();
          } else if (event.key === "F2" && state.selection.size === 1) {
            event.preventDefault();
            emitTarget("rename_requested", selectedItem());
          } else if (event.key === "Backspace") {
            event.preventDefault();
            emitCommand("back_requested");
          }
        };
        parentDocument.addEventListener("keydown", binding.onDocumentKeyDown, true);
        const frame = window.frameElement;
        if (frame && window.parent.MutationObserver) {
          binding.observer = new window.parent.MutationObserver(() => {
            if (!frame.isConnected || !workspace.isConnected) cleanupWorkspaceDropTarget();
            else scheduleRowBinding();
          });
          binding.observer.observe(parentDocument.body, { childList: true, subtree: true });
        }
        state.workspaceBinding = binding;
        scheduleRowBinding();
      }

      function closeMenus() {
        uploadMenu.classList.remove("open");
        moreMenu.classList.remove("open");
        setFrameHeight();
      }
      openButton.onclick = () => {
        closeMenus();
        openItem(selectedItem());
      };
      document.getElementById("newButton").onclick = () => { closeMenus(); emitCommand("new_folder_requested"); };
      document.getElementById("uploadButton").onclick = event => {
        event.stopPropagation();
        moreMenu.classList.remove("open");
        uploadMenu.classList.toggle("open");
        setFrameHeight();
      };
      document.getElementById("moreButton").onclick = event => {
        event.stopPropagation();
        uploadMenu.classList.remove("open");
        moreMenu.classList.toggle("open");
        setFrameHeight();
      };
      document.getElementById("filesButton").onclick = () => { closeMenus(); filesInput.click(); };
      document.getElementById("folderButton").onclick = () => { closeMenus(); folderInput.click(); };
      renameButton.onclick = () => { closeMenus(); emitTarget("rename_requested", selectedItem()); };
      deleteButton.onclick = () => { closeMenus(); showDeleteConfirmation(); };
      moreDeleteButton.onclick = () => { closeMenus(); showDeleteConfirmation(); };
      previewButton.onclick = () => { closeMenus(); emitTarget("preview_requested", selectedItem()); };
      downloadButton.onclick = () => { closeMenus(); explicitDownload(selectedItem()); };
      propertiesButton.onclick = () => { closeMenus(); emitTarget("properties_requested", selectedItem()); };
      document.getElementById("clearSelectionButton").onclick = () => { closeMenus(); clearClientSelection(); };
      document.addEventListener("click", event => {
        if (!event.target.closest(".menu-wrap")) closeMenus();
      });
      filesInput.onchange = () => { addFiles(Array.from(filesInput.files || []), state.args.current_path); filesInput.value = ""; };
      folderInput.onchange = () => { addFiles(Array.from(folderInput.files || []), state.args.current_path); folderInput.value = ""; };
      shell.ondragenter = event => {
        if (!hasExternalFiles(event)) return;
        event.preventDefault();
        state.shellDragDepth += 1;
        shell.classList.add("dragover");
      };
      shell.ondragover = event => {
        if (!hasExternalFiles(event)) return;
        event.preventDefault();
        event.dataTransfer.dropEffect = "copy";
      };
      shell.ondragleave = event => {
        if (!state.shellDragDepth) return;
        state.shellDragDepth = Math.max(0, state.shellDragDepth - 1);
        if (!state.shellDragDepth) shell.classList.remove("dragover");
      };
      shell.ondrop = async event => {
        if (!hasExternalFiles(event)) return;
        event.preventDefault();
        state.shellDragDepth = 0;
        shell.classList.remove("dragover");
        const destination = String(state.args.current_path || "");
        addFiles(await droppedItems(event.dataTransfer), destination);
      };
      window.addEventListener("message", event => {
        if (!event.data || event.data.type !== "streamlit:render") return;
        state.args = event.data.args || {};
        shell.style.display = state.args.show_toolbar === false ? "none" : "block";
        const visible = new Set(rowItems().map(item => String(item.path || "")));
        state.selection = new Set(
          Array.from(state.args.selected_paths || (state.args.selected_path ? [state.args.selected_path] : []))
            .map(String)
            .filter(path => visible.has(path))
        );
        const focusedPath = String(state.args.selected_path || "");
        state.focusedIndex = rowItems().findIndex(item => String(item.path || "") === focusedPath);
        if (state.focusedIndex < 0 && state.selection.size) {
          state.focusedIndex = rowItems().findIndex(item => state.selection.has(String(item.path || "")));
        }
        state.anchorIndex = state.focusedIndex;
        const ack = String(state.args.ack_nonce || "");
        if (ack && ack !== state.acknowledged) {
          state.acknowledged = ack;
          if (state.awaitingAck && state.awaitingAck.nonce === ack) {
            const completedRow = state.awaitingAck.row;
            state.rows = state.rows.filter(row => row !== completedRow);
            state.awaitingAck = null;
            flushCompletion();
          }
        }
        render();
        bindWorkspaceDropTarget();
        updateSelectionUi();
      });
      window.addEventListener("beforeunload", cleanupWorkspaceDropTarget);
      ready();
    </script>
  </body>
</html>
