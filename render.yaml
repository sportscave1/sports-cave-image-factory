services:
  - type: web
    name: sports-cave-image-factory
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m streamlit run app.py --server.address 0.0.0.0 --server.port $PORT --server.headless true --server.enableCORS false --server.enableWebsocketCompression false
    healthCheckPath: /
