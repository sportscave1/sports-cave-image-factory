services:
  - type: web
    name: sports-cave-image-factory
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true --server.enableCORS false --server.enableXsrfProtection false --server.fileWatcherType none --server.runOnSave false --browser.gatherUsageStats false
    healthCheckPath: /_stcore/health
  - type: web
    name: sports-cave-os-webhooks
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python webhook_server.py
    healthCheckPath: /healthz
