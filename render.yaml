services:
  - type: web
    name: sports-cave-image-factory
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python sports_cave_server.py
    healthCheckPath: /_stcore/health
    envVars:
      - key: FRAMED_CERTIFICATE_PRODUCT_HANDLE
        sync: false
      - key: FRAMED_CERTIFICATE_PRODUCT_ID
        sync: false
      - key: FRAMED_CERTIFICATE_VARIANT_ID
        sync: false
  - type: web
    name: sports-cave-os-webhooks
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python webhook_server.py
    healthCheckPath: /healthz
    envVars:
      - key: FRAMED_CERTIFICATE_PRODUCT_HANDLE
        sync: false
      - key: FRAMED_CERTIFICATE_PRODUCT_ID
        sync: false
      - key: FRAMED_CERTIFICATE_VARIANT_ID
        sync: false
